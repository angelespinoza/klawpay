<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KlawPay — Merchant Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14; --surface: #131720; --surface2: #1a1f2e;
    --border: #252b3b; --text: #c8cdd8; --dim: #6b7280;
    --accent: #6366f1; --glow: rgba(99,102,241,.15);
    --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    --radius: 10px;
  }

  body {
    font-family: 'SF Mono','Cascadia Code','Fira Code',monospace;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }

  .app { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* ── Header ── */
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-k { color: var(--accent); }
  .merchant-name { font-size: 12px; color: var(--dim); padding: 3px 10px; border-radius: 20px; background: var(--glow); border: 1px solid rgba(99,102,241,.3); }
  .lang-select { display: flex; gap: 4px; }
  .lang-btn { background: none; border: 1px solid var(--border); color: var(--dim); padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer; }
  .lang-btn:hover { border-color: var(--accent); color: var(--text); }
  .lang-active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { background: var(--surface); border: 1px solid var(--border); color: var(--dim); padding: 10px 20px; border-radius: var(--radius) var(--radius) 0 0; font-family: inherit; font-size: 12px; cursor: pointer; border-bottom: none; text-transform: uppercase; letter-spacing: 1px; }
  .tab:hover { color: var(--text); }
  .tab-active { background: var(--surface2); color: var(--accent); border-color: var(--accent); border-bottom: 2px solid var(--surface2); }

  /* ── Content ── */
  .content { background: var(--surface); border: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) var(--radius); padding: 24px; min-height: 400px; }

  /* ── Forms ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); }
  input, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  select { cursor: pointer; }

  /* ── Chains ── */
  .chains-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chain-check { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; font-size: 12px; color: var(--dim); transition: all .15s; }
  .chain-check:hover { border-color: var(--accent); }
  .chain-check.active { border-color: var(--accent); color: var(--accent); background: var(--glow); }
  .chain-check input { display: none; }

  /* ── Buttons ── */
  .btn-primary { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--accent); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: #5558e6; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary { padding: 10px 20px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); font-family: inherit; font-size: 12px; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Wallets ── */
  .wallets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  @media (max-width: 600px) { .wallets-grid { grid-template-columns: 1fr; } }
  .wallet-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .wallet-chain { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 600; }
  .wallet-addr { font-size: 11px; color: var(--dim); word-break: break-all; line-height: 1.5; }
  .copy-btn { background: var(--glow); border: 1px solid rgba(99,102,241,.3); color: var(--accent); padding: 4px 12px; border-radius: 4px; font-family: inherit; font-size: 10px; cursor: pointer; margin-top: 6px; }
  .copy-btn:hover { background: rgba(99,102,241,.25); }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  .tx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tx-table th { text-align: left; padding: 10px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); border-bottom: 1px solid var(--border); font-weight: 500; }
  .tx-table td { padding: 10px 8px; border-bottom: 1px solid rgba(37,43,59,.5); }
  .tx-table tr:last-child td { border-bottom: none; }
  .empty { text-align: center; color: var(--dim); padding: 32px !important; }
  .mono { font-size: 11px; color: var(--dim); }

  /* ── Tags ── */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-chain { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .tag-type { background: var(--glow); color: var(--accent); }
  .tag-success { background: rgba(34,197,94,.15); color: var(--green); }
  .tag-denied { background: rgba(245,158,11,.15); color: var(--amber); }
  .tag-failed { background: rgba(239,68,68,.15); color: var(--red); }
  .tag-pending { background: var(--surface); color: var(--dim); }

  /* ── Misc ── */
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 12px; }
  .dim { color: var(--dim); font-size: 12px; }
  .error-box { margin-top: 12px; padding: 10px 14px; border-radius: 6px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: var(--red); font-size: 12px; }
  .explorer-link { color: var(--accent); text-decoration: none; font-size: 11px; }
  .explorer-link:hover { text-decoration: underline; }
  .settings-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .webhook-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .webhook-box code { flex: 1; font-size: 11px; color: var(--text); word-break: break-all; }
  .conn-status { font-size: 12px; font-weight: 600; }
  .conn-ok { color: var(--green); }
  .conn-fail { color: var(--red); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
